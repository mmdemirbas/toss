version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck      # unchecked errors
    - govet         # go vet
    - staticcheck   # semantic analysis (SA*, S*, ST*, QF*)
    # Security
    - gosec         # OWASP-aligned security checks
    # Complexity
    - gocognit      # cognitive complexity (nesting-aware)
    - cyclop        # cyclomatic complexity
    - funlen        # function length
    # Quality
    - gocritic      # style and correctness patterns
    - unused        # unused code

  settings:
    gocognit:
      min-complexity: 15
    cyclop:
      max-complexity: 10
    funlen:
      lines: 80
      statements: 60
    gosec:
      excludes:
        - G115  # integer overflow on conversion — too noisy for systems code
        - G402  # TLS InsecureSkipVerify — by design: LAN peers use self-signed certs
        - G204  # subprocess with variable — clipboard ops require platform-specific tools
        - G501  # blocklisted import crypto/md5 — used for echo-prevention hash, not cryptography
        - G401  # MD5 usage — same as G501
        - G304  # file inclusion via variable — temp files created by this program
        - G706  # log injection — trusted LAN context, filenames from local store
        - G704  # SSRF — internal relay to LAN peers discovered via UDP broadcast
        - G703  # path traversal — FilePath() already sanitizes via filepath.Base()
