<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toss</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
  <link href="vendor/fonts.css" rel="stylesheet">
  <link rel="stylesheet" href="vendor/github-dark.min.css">
  <script src="vendor/highlight.min.js"></script>
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">Toss</span>
        </div>
        <button id="sidebar-toggle-btn" title="Collapse sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div class="pane-list" id="pane-list"></div>
      <div class="sidebar-footer">
        <div class="device-list" id="device-list"></div>
        <div class="status-bar">
          <span class="status-dot"></span>
          <span class="status-text">connecting...</span>
        </div>
      </div>
    </aside>

    <main id="main-content">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">⬡</div>
        <h2>No pane selected</h2>
        <p>Create a new pane or select one from the sidebar.<br>Paste images or drop files anywhere.</p>
        <div class="shortcut-hints">
          <kbd>Ctrl+V</kbd> paste image &nbsp; <kbd>Drop</kbd> files
        </div>
        <button id="choose-file-btn" class="choose-file-btn" style="margin-top:16px;padding:8px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-1);cursor:pointer;font-family:var(--font);font-size:13px;">📎 Choose Files</button>
        <input type="file" id="file-input" multiple hidden>
      </div>

      <div id="pane-view" class="pane-view hidden">
        <div class="pane-toolbar">
          <input type="text" id="pane-name" class="pane-name-input" placeholder="Untitled" spellcheck="false">
          <div class="toolbar-spacer"></div>
          <select id="lang-select" class="lang-select">
            <option value="plaintext">📄 plaintext</option>
            <option value="markdown">◈ markdown</option>
            <option disabled>────────────</option>
            <option value="bash">$_ bash</option>
            <option value="c">C  c</option>
            <option value="cpp">C⁺ c++</option>
            <option value="csharp">C# c#</option>
            <option value="css">◇ css</option>
            <option value="dart">🎯 dart</option>
            <option value="dockerfile">🐳 dockerfile</option>
            <option value="go">Go go</option>
            <option value="html">◇ html</option>
            <option value="java">☕ java</option>
            <option value="javascript">JS javascript</option>
            <option value="json">{} json</option>
            <option value="kotlin">Kt kotlin</option>
            <option value="makefile">⚙ makefile</option>
            <option value="php">🐘 php</option>
            <option value="python">🐍 python</option>
            <option value="ruby">💎 ruby</option>
            <option value="rust">🦀 rust</option>
            <option value="sql">🗄 sql</option>
            <option value="swift">🐦 swift</option>
            <option value="toml">{} toml</option>
            <option value="typescript">TS typescript</option>
            <option value="xml">◇ xml</option>
            <option value="yaml">{} yaml</option>
          </select>
          <button id="wrap-btn" class="preview-toggle" title="Enable wrap (Alt+W)">
            <span>Wrap</span>
          </button>
          <button id="preview-btn" class="preview-toggle" title="Toggle preview">
            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Preview</span>
          </button>
        </div>

        <div class="pane-content">
          <div id="editor-layer" class="editor-layer">
            <pre id="editor-highlight" class="editor-highlight" aria-hidden="true"><code id="editor-highlight-code" class="hljs language-plaintext"></code></pre>
            <textarea id="editor" class="editor" placeholder="Start typing..." spellcheck="false" wrap="off"></textarea>
          </div>
          <div id="preview" class="preview-output hidden"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="copy-toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
