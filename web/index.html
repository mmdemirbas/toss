<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LanPane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="token-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="overlay-icon">🔑</div>
        <h2>Enter Access Code</h2>
        <p>Enter the 6-character code shown on the hub device</p>
        <input type="text" id="token-input" maxlength="6" placeholder="ABC123" autocomplete="off" spellcheck="false">
        <button id="token-submit">Connect</button>
      </div>
    </div>

    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">LanPane</span>
        </div>
        <button id="new-pane-btn" title="New Pane (Ctrl+N)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="pane-list" id="pane-list"></div>
      <div class="sidebar-footer">
        <div id="hub-token-area"></div>
        <div class="device-list" id="device-list"></div>
        <div class="status-bar">
          <span class="status-dot"></span>
          <span class="status-text">connecting...</span>
        </div>
      </div>
    </aside>

    <main id="main-content">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">⬡</div>
        <h2>No pane selected</h2>
        <p>Create a new pane or select one from the sidebar.<br>Paste images or drop files anywhere.</p>
        <div class="shortcut-hints">
          <kbd>Ctrl+N</kbd> new &nbsp; <kbd>Ctrl+V</kbd> paste image &nbsp; <kbd>Drop</kbd> files
        </div>
      </div>

      <div id="pane-view" class="pane-view hidden">
        <div class="pane-toolbar">
          <input type="text" id="pane-name" class="pane-name-input" placeholder="Untitled" spellcheck="false">
          <div class="toolbar-sep"></div>
          <select id="lang-select" class="lang-select">
            <option value="plaintext">plaintext</option>
            <option value="markdown">markdown</option>
            <option disabled>------------</option>
            <option value="bash">bash</option>
            <option value="c">c</option>
            <option value="cpp">cpp</option>
            <option value="csharp">csharp</option>
            <option value="css">css</option>
            <option value="dart">dart</option>
            <option value="dockerfile">dockerfile</option>
            <option value="go">go</option>
            <option value="html">html</option>
            <option value="java">java</option>
            <option value="javascript">javascript</option>
            <option value="json">json</option>
            <option value="kotlin">kotlin</option>
            <option value="makefile">makefile</option>
            <option value="php">php</option>
            <option value="python">python</option>
            <option value="ruby">ruby</option>
            <option value="rust">rust</option>
            <option value="sql">sql</option>
            <option value="swift">swift</option>
            <option value="toml">toml</option>
            <option value="typescript">typescript</option>
            <option value="xml">xml</option>
            <option value="yaml">yaml</option>
          </select>
          <button id="preview-btn" class="preview-toggle" title="Toggle preview (Ctrl+P)">
            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Preview</span>
          </button>
          <div class="toolbar-spacer"></div>
          <button id="copy-btn" class="tool-btn" title="Copy content">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button id="delete-btn" class="tool-btn danger" title="Delete pane">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>

        <div class="pane-content">
          <div id="editor-layer" class="editor-layer">
            <pre id="editor-highlight" class="editor-highlight" aria-hidden="true"><code id="editor-highlight-code" class="hljs language-plaintext"></code></pre>
            <textarea id="editor" class="editor" placeholder="Start typing..." spellcheck="false" wrap="off"></textarea>
          </div>
          <div id="preview" class="preview-output hidden"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="copy-toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
