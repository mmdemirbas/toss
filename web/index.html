<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LanPane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Token prompt overlay -->
    <div id="token-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="overlay-icon">🔑</div>
        <h2>Enter Access Code</h2>
        <p>Enter the 6-character code shown on the hub device</p>
        <input type="text" id="token-input" maxlength="6" placeholder="ABC123" autocomplete="off" spellcheck="false">
        <button id="token-submit">Connect</button>
      </div>
    </div>

    <!-- Main layout -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">LanPane</span>
        </div>
        <button id="new-pane-btn" title="New Pane">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <div class="pane-list" id="pane-list"></div>

      <div class="sidebar-footer">
        <div class="device-list" id="device-list"></div>
        <div class="status-bar" id="status-bar">
          <span class="status-dot"></span>
          <span class="status-text">connecting...</span>
        </div>
      </div>
    </aside>

    <main id="main-content">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">⬡</div>
        <h2>No pane selected</h2>
        <p>Create a new pane or select one from the sidebar.<br>Paste images or drop files anywhere.</p>
        <div class="shortcut-hints">
          <kbd>Ctrl+V</kbd> paste image &nbsp; <kbd>Drop</kbd> files
        </div>
      </div>

      <div id="pane-editor" class="pane-editor hidden">
        <div class="pane-header">
          <input type="text" id="pane-name" class="pane-name-input" placeholder="Untitled pane" spellcheck="false">
          <div class="pane-actions">
            <button id="add-text-block" class="icon-btn" title="Add text block">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </button>
            <button id="add-code-block" class="icon-btn" title="Add code block">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </button>
            <button id="delete-pane-btn" class="icon-btn danger" title="Delete pane">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <div class="blocks-container" id="blocks-container"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
